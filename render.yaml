services:
  - type: web
    runtime: python
    name: glucolens-backend
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from app.db.init_db import init_db; init_db()" && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENV
        value: prod
      - key: APP_NAME
        value: GlucoLens API
      - key: DATABASE_URL
        fromDatabase:
          name: glucolens-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL_MIN
        value: "15"
      - key: JWT_REFRESH_TTL_DAYS
        value: "30"
      - key: SETUP_TOKEN
        generateValue: true
      - key: API_BASE_URL
        value: https://glucolens-backend.onrender.com
      - key: FRONTEND_BASE_URL
        value: https://glucolens-frontend.onrender.com
      - key: CORS_ALLOW_ORIGINS
        value: https://glucolens-frontend.onrender.com
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false
      - key: PHARMACY_MONTHLY_KOBO
        value: "700000"
      - key: PHARMACY_ANNUAL_KOBO
        value: "7000000"
      - key: CLINIC_MONTHLY_KOBO
        value: "1000000"
      - key: CLINIC_ANNUAL_KOBO
        value: "10000000"
      - key: HOSPITAL_MONTHLY_KOBO
        value: "1500000"
      - key: HOSPITAL_ANNUAL_KOBO
        value: "15000000"

  - type: web
    runtime: static
    name: glucolens-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://glucolens-backend.onrender.com
      - key: VITE_PAYSTACK_PUBLIC_KEY
        sync: false
      - key: VITE_DEFAULT_COUNTRY
        value: NG
      - key: VITE_DEFAULT_LANG
        value: en
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: glucolens-db
    plan: free
    databaseName: glucolens
    user: glucolens
