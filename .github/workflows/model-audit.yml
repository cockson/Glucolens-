name: Quality Gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-model-governance:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audit dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-audit.txt

      - name: Check artifact freshness
        run: |
          python scripts/check_artifact_freshness.py

      - name: Run strict tabular audit
        env:
          PYTHONPATH: .
        run: |
          python -m app.ml.tabular.audit_strict \
            --csv data/anthropometric_data/train_tabular.csv \
            --output-dir artifacts/audit/tabular \
            --strict

      - name: Backend syntax smoke check
        run: |
          python -m compileall app/ml app/services app/api/routes scripts

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tabular-audit-artifacts
          path: |
            backend/artifacts/audit/tabular/audit_report.json
            backend/artifacts/audit/tabular/calibration_oof.png

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
